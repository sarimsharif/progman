name: Build and Deploy the repo
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          pacman -Syu --noconfirm base-devel git rust

      - name: Create build user
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          chown -R builder:builder .

      - name: Build all packages
        run: |
          mkdir -p repo/x86_64
          chown -R builder:builder repo

          for pkgdir in packages/*/; do
            echo "==> Building $pkgdir"

            mkdir -p /tmp/build
            cp -r "$pkgdir" /tmp/build/pkg
            chown -R builder:builder /tmp/build

            cd /tmp/build/pkg
            sudo -u builder makepkg -s --noconfirm --noprogressbar -f

            cp /tmp/build/pkg/*.pkg.tar.zst $GITHUB_WORKSPACE/repo/x86_64/
            cd $GITHUB_WORKSPACE
            rm -rf /tmp/build
          done

      - name: Generate repo database
        run: |
          cd repo/x86_64
          repo-add progman.db.tar.gz *.pkg.tar.zst

      - name: Create index page
        run: |
          cat > repo/index.html <<'EOF'
          <!DOCTYPE html>
          <html>
          <head><title>progman repo</title></head>
          <body>
            <p>Add to <code>/etc/pacman.conf</code>:</p>
            <pre>
          [progman]
          SigLevel = Optional TrustAll
          Server = https://sarimsharif.github.io/progman/x86_64
            </pre>
          </body>
          </html>
          EOF

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./repo
          force_orphan: true
