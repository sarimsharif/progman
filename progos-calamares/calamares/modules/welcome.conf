# modules/welcome.conf
---
# Show "What's new" / release notes URL (optional, leave blank to hide)
# releaseNotesUrl: "https://progos.example.com/release-notes"

# Conditions that must be true before the Next button is enabled.
# Remove any you don't want to enforce.
requirements:
  check:
    - storage       # Enough disk space
    - ram           # Enough RAM
    - power         # On AC power (disable for VMs / testing)
    - internet      # Has network (disable if you ship offline)
    - root          # Running as root
    - screen        # Screen is big enough
  required:
    - storage
    - ram
    - root

# Minimum values used by the checks above
# storageGB: 20     # default is 10 GB
# ramGB:     2      # default is 1 GB
