# modules/bootloader.conf
---
# Supports: grub, systemd-boot, refind
efiBootLoader: "grub"
kernelLine:    " quiet splash"
fallbackKernelLine: " verbose"

# GRUB target directory on the installed system
grubInstall:   "grub-install"
grubMkconfig:  "grub-mkconfig"
grubCfg:       "/boot/grub/grub.cfg"
grubProbe:     "grub-probe"

# Label shown in the GRUB/EFI menu
bootloaderEntryName: "ProgOS"

# Install GRUB even on EFI systems as fallback
installEFIFallback: true
