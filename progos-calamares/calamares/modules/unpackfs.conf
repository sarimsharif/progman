# modules/unpackfs.conf
# Tells Calamares where your root filesystem image lives on the live ISO.
---
unpack:
  - source: "/run/archiso/bootmnt/arch/x86_64/airootfs.sfs"
    sourcefs: "squashfs"
    destination: ""   # empty = mount root (/)

  # If you use a separate /home image, add another entry:
  # - source: "/run/archiso/bootmnt/arch/x86_64/home.sfs"
  #   sourcefs: "squashfs"
  #   destination: "/home"
