# =============================================================
# Calamares settings.conf — ProgOS
# =============================================================

# Where to look for modules (local = /etc/calamares/modules)
modules-search: [ local, /usr/lib/calamares/modules ]

# Installer sequence
sequence:
  # --- Pages shown to the user ---
  - show:
    - welcome
    - locale
    - keyboard
    - partition
    - users
    - summary

  # --- Actions executed in background ---
  - exec:
    - partition
    - mount
    - unpackfs
    - machineid
    - fstab
    - locale
    - keyboard
    - localecfg
    - users
    - networkcfg
    - hwclock
    - services-systemd
    - packages
    - grubcfg
    - bootloader
    - umount

  # --- Final screen ---
  - show:
    - finished

# Branding folder name (matches branding/progos/)
branding: progos

# Ask user to confirm before installing
prompt-install: true

# Must be false for a real install
dont-chroot: false

oem-setup: false
disable-cancel: false
disable-cancel-during-exec: false
hide-back-and-next-during-exec: true
quit-at-end: false
